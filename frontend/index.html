<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Compras — Qualimpel</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f1117;--bg2:#161b27;--card:#1e2535;--card2:#242d40;
  --border:#2a3347;--border2:#3a4560;
  --text:#e8eaf0;--text2:#8892a4;--text3:#5a6478;
  --accent:#4f8ef7;--accent2:#3a6fd8;
  --green:#22c55e;--green2:#16a34a;
  --yellow:#f59e0b;--yellow2:#d97706;
  --red:#ef4444;--red2:#dc2626;
  --purple:#a855f7;--cyan:#06b6d4;--orange:#f97316;
  --radius:10px;--radius2:6px;
  --shadow:0 2px 12px rgba(0,0,0,.35);
  --trans:all .18s ease;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh;display:flex;}
#sidebar{width:220px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;left:0;top:0;bottom:0;z-index:100;}
#sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border);}
#sidebar-logo .logo-title{font-size:15px;font-weight:700;color:var(--accent);}
#sidebar-logo .logo-sub{font-size:11px;color:var(--text3);margin-top:2px;}
#sidebar-nav{flex:1;padding:10px 0;overflow-y:auto;}
.nav-section{padding:14px 16px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--text2);border-left:3px solid transparent;transition:var(--trans);font-size:13px;}
.nav-item:hover{background:rgba(79,142,247,.07);color:var(--text);}
.nav-item.active{background:rgba(79,142,247,.12);color:var(--accent);border-left-color:var(--accent);}
#sidebar-user{padding:14px 16px;border-top:1px solid var(--border);font-size:12px;}
.su-name{font-weight:600;color:var(--text);margin-bottom:2px;}
.su-role{font-size:11px;color:var(--text3);}
.su-btn{margin-top:8px;padding:6px 12px;background:rgba(79,142,247,.12);color:var(--accent);border:1px solid rgba(79,142,247,.25);border-radius:var(--radius2);cursor:pointer;width:100%;font-size:12px;transition:var(--trans);}
.su-btn:hover{background:rgba(79,142,247,.22);}
.su-logout{margin-top:6px;padding:6px 12px;background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25);border-radius:var(--radius2);cursor:pointer;width:100%;font-size:12px;transition:var(--trans);}
.su-logout:hover{background:rgba(239,68,68,.22);}
#main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
#topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50;}
#topbar h1{font-size:16px;font-weight:600;flex:1;}
#page-content{padding:24px;flex:1;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.stat-card .sc-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.stat-card .sc-value{font-size:26px;font-weight:700;line-height:1;}
.stat-card .sc-sub{font-size:11px;color:var(--text3);margin-top:4px;}
.sc-blue .sc-value{color:var(--accent);}.sc-green .sc-value{color:var(--green);}
.sc-yellow .sc-value{color:var(--yellow);}.sc-red .sc-value{color:var(--red);}
.sc-purple .sc-value{color:var(--purple);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius2);border:none;cursor:pointer;font-size:13px;font-weight:500;transition:var(--trans);}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-success{background:var(--green2);color:#fff;}.btn-success:hover{background:#15803d;}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}.btn-danger:hover{background:rgba(239,68,68,.25);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}.btn-ghost:hover{border-color:var(--border2);color:var(--text);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-yellow{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid rgba(245,158,11,.3);}.btn-yellow:hover{background:rgba(245,158,11,.25);}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius2);padding:8px 12px;color:var(--text);font-size:13px;outline:none;transition:var(--trans);}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.15);}
.form-group textarea{resize:vertical;min-height:70px;}
.form-group select option{background:var(--card);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;width:100%;max-width:600px;box-shadow:var(--shadow);animation:fadeUp .2s ease;}
.modal-lg{max-width:820px;}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-header h2{font-size:15px;font-weight:600;}
.modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;line-height:1;padding:2px 6px;border-radius:4px;}
.modal-close:hover{background:var(--border);}
.modal-body{padding:20px 22px;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--card2);padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);font-weight:600;}
tbody tr{border-top:1px solid var(--border);transition:var(--trans);}
tbody tr:hover{background:rgba(255,255,255,.02);}
tbody td{padding:10px 14px;font-size:13px;vertical-align:middle;}
.actions{display:flex;gap:6px;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge-aberta{background:rgba(6,182,212,.15);color:var(--cyan);}
.badge-cotando{background:rgba(168,85,247,.15);color:var(--purple);}
.badge-pedido_gerado{background:rgba(79,142,247,.15);color:var(--accent);}
.badge-cancelada,.badge-cancelado{background:rgba(239,68,68,.12);color:var(--red);}
.badge-aguardando_aprovacao{background:rgba(245,158,11,.15);color:var(--yellow);}
.badge-aprovado{background:rgba(34,197,94,.15);color:var(--green);}
.badge-reprovado{background:rgba(239,68,68,.15);color:var(--red);}
.badge-recebido_parcial{background:rgba(168,85,247,.15);color:var(--purple);}
.badge-recebido_total,.badge-finalizado{background:rgba(34,197,94,.25);color:#16a34a;}
.badge-baixa{background:rgba(34,197,94,.1);color:var(--green);}
.badge-media{background:rgba(6,182,212,.1);color:var(--cyan);}
.badge-alta{background:rgba(245,158,11,.15);color:var(--yellow);}
.badge-urgente{background:rgba(239,68,68,.15);color:var(--red);}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filters input,.filters select{background:var(--card);border:1px solid var(--border);border-radius:var(--radius2);padding:7px 12px;color:var(--text);font-size:13px;outline:none;}
.filters input:focus,.filters select:focus{border-color:var(--accent);}

/* ── KANBAN ── */
#kanban-container{overflow-x:auto;padding-bottom:12px;}
.kanban-board{display:flex;gap:14px;min-width:max-content;padding:4px 2px;}
.kanban-col{width:240px;flex-shrink:0;display:flex;flex-direction:column;background:var(--card2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.kanban-col-header{padding:12px 14px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.kanban-col-header .col-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.kanban-col-header .col-count{font-size:11px;background:var(--border);color:var(--text2);padding:2px 7px;border-radius:10px;}
.kanban-cards{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:80px;}
.kanban-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:grab;transition:var(--trans);position:relative;user-select:none;}
.kanban-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.3);}
.kanban-card.dragging{opacity:.5;cursor:grabbing;transform:rotate(2deg);}
.kanban-col.drag-over .kanban-cards{background:rgba(79,142,247,.06);border-radius:6px;}
.kc-numero{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.kc-item{font-size:13px;font-weight:500;margin-bottom:4px;line-height:1.3;}
.kc-fornecedor{font-size:11px;color:var(--text2);margin-bottom:6px;}
.kc-valor{font-size:13px;font-weight:700;color:var(--green);}
.kc-urgencia{position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%;}
.urg-baixa{background:var(--green);}.urg-media{background:var(--cyan);}
.urg-alta{background:var(--yellow);}.urg-urgente{background:var(--red);}
.col-req_aberta .kanban-col-header{border-top:3px solid var(--cyan);}
.col-req_cotando .kanban-col-header{border-top:3px solid var(--purple);}
.col-aguardando_aprovacao .kanban-col-header{border-top:3px solid var(--yellow);}
.col-aprovado .kanban-col-header{border-top:3px solid var(--green);}
.col-finalizado .kanban-col-header{border-top:3px solid #16a34a;}
.col-cancelado .kanban-col-header{border-top:3px solid var(--red);}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab{padding:9px 16px;cursor:pointer;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:var(--trans);}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500;}
.cotacao-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;}
.cotacao-card.selecionada{border-color:var(--green);background:rgba(34,197,94,.04);}
.cotacao-card .cc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.cotacao-card .cc-fornecedor{font-weight:600;font-size:13px;}
.cotacao-card .cc-valor{font-size:15px;font-weight:700;color:var(--green);}
.cotacao-card .cc-details{font-size:12px;color:var(--text2);}
.hist-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.hist-item:last-child{border-bottom:none;}
.hist-dot{width:10px;height:10px;border-radius:50%;margin-top:3px;flex-shrink:0;}
.hist-dot-green{background:var(--green);}.hist-dot-yellow{background:var(--yellow);}
.hist-dot-red{background:var(--red);}.hist-dot-blue{background:var(--accent);}
.hist-dot-gray{background:var(--text3);}
.hist-info .hi-status{font-size:12px;font-weight:600;}
.hist-info .hi-user{font-size:12px;color:var(--text2);}
.hist-info .hi-obs{font-size:12px;color:var(--text3);margin-top:2px;}
.hist-info .hi-date{font-size:11px;color:var(--text3);}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.page-header h2{font-size:18px;font-weight:700;}
.empty{text-align:center;padding:48px 24px;color:var(--text3);}
.empty .ei{font-size:36px;margin-bottom:10px;}
.section-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.info-item .ii-label{font-size:11px;color:var(--text3);margin-bottom:2px;}
.info-item .ii-value{font-size:13px;font-weight:500;}
.alert{padding:10px 14px;border-radius:var(--radius2);font-size:13px;margin-bottom:14px;}
.alert-warning{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--yellow);}
.alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green);}
.alert-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);}
.alert-info{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);color:var(--accent);}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-full{display:flex;align-items:center;justify-content:center;height:200px;gap:12px;color:var(--text2);}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.tag{display:inline-flex;align-items:center;gap:4px;background:rgba(79,142,247,.12);color:var(--accent);border:1px solid rgba(79,142,247,.2);border-radius:20px;padding:3px 10px;font-size:12px;}
.tag .tag-x{cursor:pointer;font-size:14px;line-height:1;opacity:.7;}.tag .tag-x:hover{opacity:1;}
.hist-compra{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;}
.hist-compra .hc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.hist-compra .hc-num{font-weight:700;color:var(--accent);font-size:12px;}
.hist-compra .hc-valor{font-weight:700;color:var(--green);}
.hist-compra .hc-detail{font-size:12px;color:var(--text2);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page" style="display:flex;width:100%;min-height:100vh;align-items:center;justify-content:center;background:var(--bg);">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:var(--shadow);">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:28px;margin-bottom:8px;">🛒</div>
      <div style="font-size:18px;font-weight:700;color:var(--accent);">Compras</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px;">Qualimpel Indústria Química</div>
    </div>
    <div class="form-group"><label>E-mail</label><input type="email" id="login-email" placeholder="admin@compras.com"/></div>
    <div class="form-group"><label>Senha</label><input type="password" id="login-password" placeholder="••••••••"/></div>
    <div id="login-error" style="color:var(--red);font-size:12px;margin-bottom:10px;display:none;"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;width:100%;">
  <div id="sidebar">
    <div id="sidebar-logo">
      <div class="logo-title">🛒 Compras</div>
      <div class="logo-sub">Qualimpel ERP</div>
    </div>
    <nav id="sidebar-nav">
      <div class="nav-section">Principal</div>
      <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard"><span>📊</span>Dashboard</div>
      <div class="nav-item" onclick="navigate('kanban')" id="nav-kanban"><span>🗂️</span>Kanban de Compras</div>
      <div class="nav-item" onclick="navigate('requisicoes')" id="nav-requisicoes"><span>📋</span>Requisições</div>
      <div class="nav-item" onclick="navigate('pedidos')" id="nav-pedidos"><span>📦</span>Pedidos de Compra</div>
      <div class="nav-section">Cadastros</div>
      <div class="nav-item" onclick="navigate('itens')" id="nav-itens"><span>🏷️</span>Itens</div>
      <div class="nav-item" onclick="navigate('fornecedores')" id="nav-fornecedores"><span>🏭</span>Fornecedores</div>
      <div class="nav-section" id="nav-admin-section" style="display:none;">Administração</div>
      <div class="nav-item" onclick="navigate('usuarios')" id="nav-usuarios" style="display:none;"><span>👥</span>Usuários</div>
    </nav>
    <div id="sidebar-user">
      <div class="su-name" id="su-name">-</div>
      <div class="su-role" id="su-role">-</div>
      <button class="su-btn" onclick="showContaSenha()">⚙ Minha Conta</button>
      <button class="su-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div id="main">
    <div id="topbar"><h1 id="topbar-title">Dashboard</h1></div>
    <div id="page-content"></div>
  </div>
</div>

<!-- Modais -->
<div class="modal-overlay" id="modal-main">
  <div class="modal" id="modal-main-box">
    <div class="modal-header"><h2 id="modal-title">-</h2><button class="modal-close" onclick="closeModal('modal-main')">✕</button></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>
<div class="modal-overlay" id="modal-detail">
  <div class="modal modal-lg">
    <div class="modal-header"><h2 id="modal-detail-title">-</h2><button class="modal-close" onclick="closeModal('modal-detail')">✕</button></div>
    <div class="modal-body" id="modal-detail-body"></div>
    <div class="modal-footer" id="modal-detail-footer"></div>
  </div>
</div>
<div class="modal-overlay" id="modal-conta">
  <div class="modal">
    <div class="modal-header"><h2>Minha Conta</h2><button class="modal-close" onclick="closeModal('modal-conta')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Senha atual</label><input type="password" id="cp-atual"/></div>
      <div class="form-group"><label>Nova senha</label><input type="password" id="cp-nova"/></div>
      <div class="form-group"><label>Confirmar nova senha</label><input type="password" id="cp-conf"/></div>
      <div id="cp-msg" style="font-size:12px;margin-top:6px;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-conta')">Cancelar</button>
      <button class="btn btn-primary" onclick="trocarSenha()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════════════════════
const API = '';
let token = localStorage.getItem('compras_token') || '';
let currentUser = JSON.parse(localStorage.getItem('compras_user') || 'null');
let currentPage = 'dashboard';
let _categorias = [];

// ═══════════════════════════════════════════════════════════
// FETCH
// ═══════════════════════════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (r.status === 401) { doLogout(); return null; }
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Erro'); }
  if (r.status === 204) return null;
  return r.json();
}
async function apiForm(path, body) {
  const r = await fetch(API + path, { method:'POST', headers:{Authorization:`Bearer ${token}`}, body: new URLSearchParams(body) });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Erro'); }
  return r.json();
}

// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════
async function doLogin() {
  const email = R('login-email').value.trim(), pass = R('login-password').value;
  const err = R('login-error'); err.style.display = 'none';
  try {
    const d = await apiForm('/api/auth/token', { username: email, password: pass });
    token = d.access_token;
    currentUser = { id: d.user_id, nome: d.user_name, role: d.user_role };
    localStorage.setItem('compras_token', token);
    localStorage.setItem('compras_user', JSON.stringify(currentUser));
    initApp();
  } catch(e) { err.textContent = e.message; err.style.display = 'block'; }
}

// KANBAN — com drag and drop
// ═══════════════════════════════════════════════════════════
const KB_COLS = [
  { key:'req_aberta',  title:'Requisições',    tipo:'req', status:'aberta' },
  { key:'req_cotando', title:'Cotando',         tipo:'req', status:'cotando' },
  { key:'aguardando_aprovacao', title:'Ag. Aprovação', tipo:'pc', status:'aguardando_aprovacao' },
  { key:'aprovado',    title:'Aprovado',        tipo:'pc', status:'aprovado' },
  { key:'finalizado',  title:'Recebido / Finalizado', tipo:'pc', status:['recebido_parcial','recebido_total','pago','finalizado'] },
  { key:'cancelado',   title:'Cancelado',       tipo:'pc', status:'cancelado' },
];

function colItems(col, reqs, pcs) {
  if (col.tipo === 'req') return (reqs||[]).filter(r => r.status === col.status);
  if (Array.isArray(col.status)) return (pcs||[]).filter(p => col.status.includes(p.status));
  return (pcs||[]).filter(p => p.status === col.status);
}

async function renderKanban() {
  R('page-content').innerHTML = '<div class="loading-full"><div class="spinner"></div> Carregando Kanban...</div>';
  try {
    const [reqs, pcs] = await Promise.all([api('GET','/api/requisicoes/'), api('GET','/api/pedidos/')]);
    window._kb_req = reqs||[]; window._kb_pc = pcs||[];

    const filterBar = `<div class="filters" style="margin-bottom:16px;">
      <input id="kb-search" placeholder="🔍 Buscar item ou número..." style="min-width:220px;" oninput="filterKanban()"/>
      <select id="kb-urgencia" onchange="filterKanban()"><option value="">Todas as urgências</option>
        <option value="urgente">Urgente</option><option value="alta">Alta</option>
        <option value="media">Média</option><option value="baixa">Baixa</option></select>
      <button class="btn btn-primary btn-sm" onclick="showNovaRequisicao()">+ Nova Requisição</button>
    </div>`;

    const board = `<div id="kanban-container"><div class="kanban-board" id="kanban-board">
      ${KB_COLS.map(col => {
        const items = colItems(col, reqs, pcs);
        return `<div class="kanban-col col-${col.key}" id="kcol-${col.key}" data-col="${col.key}"
          ondragover="kDragOver(event,this)" ondrop="kDrop(event,this)" ondragleave="kDragLeave(this)">
          <div class="kanban-col-header">
            <span class="col-title">${col.title}</span>
            <span class="col-count" id="kcount-${col.key}">${items.length}</span>
          </div>
          <div class="kanban-cards" id="kcards-${col.key}">
            ${items.map(item => kanbanCard(item, col.tipo)).join('') || emptyCol()}
          </div>
        </div>`;
      }).join('')}
    </div></div>`;

    R('page-content').innerHTML = filterBar + board;
  } catch(e) { R('page-content').innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
}

function emptyCol() { return '<div style="text-align:center;padding:16px;font-size:12px;color:var(--text3);">Vazio</div>'; }

function kanbanCard(item, tipo) {
  const id = `kcard-${tipo}-${item.id}`;
  if (tipo === 'req') {
    return `<div class="kanban-card" id="${id}" draggable="false"
      onclick="showReqDetail(${item.id})" data-tipo="req" data-id="${item.id}">
      <div class="kc-urgencia urg-${item.urgencia}"></div>
      <div class="kc-numero">${item.numero}</div>
      <div class="kc-item">${item.item_nome}</div>
      <div class="kc-fornecedor">${item.solicitante_nome}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px;">Qtd: ${item.quantidade} ${item.item_unidade}</div>
      <div style="margin-top:6px;">${badge(item.urgencia)}</div>
    </div>`;
  }
  return `<div class="kanban-card" id="${id}" draggable="true"
    onclick="showPedidoDetail(${item.id})" data-tipo="pc" data-id="${item.id}"
    ondragstart="kDragStart(event,this)">
    <div class="kc-numero">${item.numero}</div>
    <div class="kc-item">${item.item_nome}</div>
    <div class="kc-fornecedor">${item.fornecedor_nome}</div>
    <div class="kc-valor">${fmt(item.preco_total)}</div>
    <div style="font-size:12px;color:var(--text2);margin-top:4px;">Qtd: ${item.quantidade} ${item.item_unidade}</div>
    <div style="margin-top:6px;">${badge(item.status)}</div>
  </div>`;
}

// Drag & Drop
let _dragId = null, _dragTipo = null;
function kDragStart(e, el) {
  _dragId = parseInt(el.dataset.id); _dragTipo = el.dataset.tipo;
  el.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function kDragOver(e, col) { e.preventDefault(); col.classList.add('drag-over'); }
function kDragLeave(col) { col.classList.remove('drag-over'); }
async function kDrop(e, col) {
  e.preventDefault(); col.classList.remove('drag-over');
  if (!_dragId || _dragTipo !== 'pc') return;
  const colKey = col.dataset.col;
  const colDef = KB_COLS.find(c => c.key === colKey);
  if (!colDef || colDef.tipo !== 'pc') return;

  // Mapa de transições permitidas
  const transitions = {
    aguardando_aprovacao: null, // só via botão de aprovação
    aprovado: null,             // só via botão
    finalizado: 'confirm_recebimento',
    cancelado: 'confirm_cancel',
  };

  const pedido = (window._kb_pc||[]).find(p => p.id === _dragId);
  if (!pedido) return;

  if (colKey === 'finalizado') {
    if (!['aprovado','pago'].includes(pedido.status)) {
      alert('Só é possível mover para Recebido após o pedido ser aprovado.');
      return;
    }
    showRecebimento(_dragId, true);
  } else if (colKey === 'cancelado') {
    if (!confirm(`Cancelar o pedido ${pedido.numero}?`)) return;
    try { await api('DELETE',`/api/pedidos/${_dragId}`); await renderKanban(); } catch(e) { alert(e.message); }
  }
  _dragId = null; _dragTipo = null;
  document.querySelectorAll('.kanban-card.dragging').forEach(el => el.classList.remove('dragging'));
}

function filterKanban() {
  const busca = (R('kb-search')?.value||'').toLowerCase();
  const urgencia = R('kb-urgencia')?.value||'';
  KB_COLS.forEach(col => {
    let items = colItems(col, window._kb_req, window._kb_pc);
    if (busca) items = items.filter(i => (i.item_nome||'').toLowerCase().includes(busca) || (i.numero||'').toLowerCase().includes(busca));
    if (urgencia && col.tipo==='req') items = items.filter(i => i.urgencia===urgencia);
    const cont = R(`kcards-${col.key}`), cnt = R(`kcount-${col.key}`);
    if (cont) cont.innerHTML = items.map(i=>kanbanCard(i,col.tipo)).join('') || emptyCol();
    if (cnt) cnt.textContent = items.length;
  });
}

function refreshKanbanCard(tipo, id, newData) {
  // Atualiza dados locais e re-renderiza o card sem recarregar tudo
  if (tipo === 'req') {
    const idx = (window._kb_req||[]).findIndex(r => r.id === id);
    if (idx >= 0) window._kb_req[idx] = newData;
    else window._kb_req = [...(window._kb_req||[]), newData];
  } else {
    const idx = (window._kb_pc||[]).findIndex(p => p.id === id);
    if (idx >= 0) window._kb_pc[idx] = newData;
    else window._kb_pc = [...(window._kb_pc||[]), newData];
  }
  // Rebuild all columns from updated data
  KB_COLS.forEach(col => {
    const items = colItems(col, window._kb_req, window._kb_pc);
    const cont = R(`kcards-${col.key}`), cnt = R(`kcount-${col.key}`);
    if (cont) cont.innerHTML = items.map(i=>kanbanCard(i,col.tipo)).join('') || emptyCol();
    if (cnt) cnt.textContent = items.length;
  });
}

      <div class="form-group"><label>Urgência</label><select id="nreq-urg">
        <option value="baixa">Baixa</option><option value="media" selected>Média</option>
        <option value="alta">Alta</option><option value="urgente">Urgente</option></select></div>
      <div class="form-group"><label>Data necessidade</label><input type="date" id="nreq-dt"/></div>
    </div>
    <div class="form-group"><label>Justificativa</label><textarea id="nreq-just"></textarea></div>
    <div id="nreq-msg" style="font-size:12px;"></div>`,

     <button class="btn btn-primary" onclick="submitRequisicao()">Criar Requisição</button>`);

}
function updateUnit() {

}
async function submitRequisicao() {
  const msg = R('nreq-msg');
  try {
    const novo = await api('POST','/api/requisicoes/',{
      item_id: parseInt(R('nreq-item').value), quantidade: parseFloat(R('nreq-qty').value),

    });

async function showReqDetail(id) {

          <span class="cc-valor">${fmt(c.preco_total)}</span>

      <div class="info-item"><div class="ii-label">Quantidade</div><div class="ii-value">${req.quantidade} ${req.item_unidade}</div></div>

      <div class="info-item"><div class="ii-label">Solicitante</div><div class="ii-value">${req.solicitante_nome}</div></div>

    ${req.justificativa?`<div class="form-group"><label style="color:var(--text3);font-size:11px;">Justificativa</label><div>${req.justificativa}</div></div>`:''}
    <div class="section-title" style="margin-top:16px;">Cotações (<span id="cot-count">${(cotacoes||[]).length}</span>)</div>
    <div id="cots-list">${cotsHtml(cotacoes)}</div>
    ${podeEditar?`
    <div class="section-title" style="margin-top:14px;">Adicionar cotação</div>
    <div class="form-row">
      <div class="form-group"><label>Fornecedor</label><select id="cot-forn">${fopts}</select></div>
      <div class="form-group"><label>Preço unitário (R$)</label><input type="number" id="cot-preco" step="0.01" min="0" placeholder="0,00" oninput="calcCotTotal()"/></div>
    </div>
    <div class="form-row-3">
      <div class="form-group"><label>Quantidade</label><input type="number" id="cot-qty" value="${req.quantidade}" step="0.01" oninput="calcCotTotal()"/></div>
      <div class="form-group"><label>Prazo (dias)</label><input type="number" id="cot-prazo" placeholder="Ex: 10"/></div>
      <div class="form-group"><label>Cond. pagamento</label><input type="text" id="cot-pgto" placeholder="Ex: 30 dias"/></div>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:10px;">Total estimado: <b id="cot-total" style="color:var(--green);">R$ 0,00</b></div>
    <div id="cot-msg" style="font-size:12px;"></div>

    `${podeEditar&&(cotacoes||[]).length>0?`<button class="btn btn-success" onclick="showNovoPedido(${id})">Gerar Pedido de Compra</button>`:''}

function calcCotTotal() {
  const p=parseFloat(R('cot-preco')?.value)||0, q=parseFloat(R('cot-qty')?.value)||0;
  if(R('cot-total')) R('cot-total').textContent=fmt(p*q);
}
async function submitCotacao(reqId) {
  const msg = R('cot-msg');
  try {
    const novaCot = await api('POST',`/api/requisicoes/${reqId}/cotacoes`,{
      requisicao_id:reqId, fornecedor_id:parseInt(R('cot-forn').value),
      preco_unitario:parseFloat(R('cot-preco').value), quantidade:parseFloat(R('cot-qty').value),
      prazo_entrega_dias:parseInt(R('cot-prazo').value)||null,
      condicao_pagamento:R('cot-pgto').value||null
    });
    // Atualiza lista de cotações em tempo real SEM fechar o modal
    window._cotsCache = [...(window._cotsCache||[]), novaCot];
    const cotsList = R('cots-list');
    if (cotsList) {
      cotsList.innerHTML = window._cotsCache.map(c=>`
        <div class="cotacao-card ${c.selecionada?'selecionada':''}">
          <div class="cc-header">
            <span class="cc-fornecedor">${c.fornecedor_nome} ${c.selecionada?'<span style="color:var(--green);font-size:11px;">✓ Selecionada</span>':''}</span>
            <span class="cc-valor">${fmt(c.preco_total)}</span>
          </div>
          <div class="cc-details">
            Unit: ${fmt(c.preco_unitario)} × ${c.quantidade} |
            Prazo: ${c.prazo_entrega_dias?c.prazo_entrega_dias+' dias':'-'} |
            Pgto: ${c.condicao_pagamento||'-'}
          </div>
          <div style="display:flex;gap:6px;margin-top:8px;">
            ${!c.selecionada?`<button class="btn btn-success btn-sm" onclick="selecionarCotacaoInline(${c.id},${reqId})">Selecionar</button>`:''}
            <button class="btn btn-danger btn-sm" onclick="deleteCotacaoInline(${reqId},${c.id})">Remover</button>
          </div>
        </div>`).join('');
    }
    const cnt = R('cot-count'); if(cnt) cnt.textContent = window._cotsCache.length;
    // Limpa campos do form
    ['cot-preco','cot-prazo','cot-pgto'].forEach(id=>{const el=R(id);if(el)el.value='';});
    if(R('cot-total')) R('cot-total').textContent='R$ 0,00';
    msg.style.color='var(--green)'; msg.textContent='Cotação adicionada!';
    setTimeout(()=>{if(R('cot-msg'))R('cot-msg').textContent='';},2000);
    // Atualiza botão gerar PC no footer
    const footer = R('modal-detail-footer');
    if (footer && !footer.querySelector('.btn-success')) {
      footer.innerHTML = `<button class="btn btn-success" onclick="showNovoPedido(${reqId})">Gerar Pedido de Compra</button>
        <button class="btn btn-ghost" onclick="closeModal('modal-detail')">Fechar</button>`;
    }
    // Atualiza status da req no kanban se necessário
    const reqAtual = (window._kb_req||[]).find(r=>r.id===reqId);
    if (reqAtual && reqAtual.status==='aberta') {
      const reqAtualizado = await api('GET',`/api/requisicoes/${reqId}`);
      if (reqAtualizado && currentPage==='kanban') refreshKanbanCard('req', reqId, reqAtualizado);
    }
  } catch(e) { msg.style.color='var(--red)'; msg.textContent=e.message; }
}
async function selecionarCotacaoInline(cotId, reqId) {
  await api('PUT',`/api/requisicoes/${reqId}/cotacoes/${cotId}`,{selecionada:true});
  window._cotsCache = (window._cotsCache||[]).map(c=>({...c, selecionada: c.id===cotId}));
  const cotsList = R('cots-list');
  if(cotsList) cotsList.innerHTML = window._cotsCache.map(c=>`
    <div class="cotacao-card ${c.selecionada?'selecionada':''}">
      <div class="cc-header">
        <span class="cc-fornecedor">${c.fornecedor_nome} ${c.selecionada?'<span style="color:var(--green);font-size:11px;">✓ Selecionada</span>':''}</span>
        <span class="cc-valor">${fmt(c.preco_total)}</span>
      </div>
      <div class="cc-details">Unit: ${fmt(c.preco_unitario)} × ${c.quantidade} | Prazo: ${c.prazo_entrega_dias?c.prazo_entrega_dias+' dias':'-'} | Pgto: ${c.condicao_pagamento||'-'}</div>
      <div style="display:flex;gap:6px;margin-top:8px;">
        ${!c.selecionada?`<button class="btn btn-success btn-sm" onclick="selecionarCotacaoInline(${c.id},${reqId})">Selecionar</button>`:''}
        <button class="btn btn-danger btn-sm" onclick="deleteCotacaoInline(${reqId},${c.id})">Remover</button>
      </div>
    </div>`).join('');
}
async function deleteCotacaoInline(reqId, cotId) {
  if(!confirm('Remover esta cotação?')) return;
  await api('DELETE',`/api/requisicoes/${reqId}/cotacoes/${cotId}`);
  window._cotsCache = (window._cotsCache||[]).filter(c=>c.id!==cotId);
  selecionarCotacaoInline(-1, reqId); // re-renderiza
}
async function selecionarCotacao(cotId, reqId) {
  await api('PUT',`/api/requisicoes/${reqId}/cotacoes/${cotId}`,{selecionada:true});
  showReqDetail(reqId);
}
async function deleteCotacao(reqId, cotId) {
  if(!confirm('Remover esta cotação?')) return;
  await api('DELETE',`/api/requisicoes/${reqId}/cotacoes/${cotId}`);
  showReqDetail(reqId);
}

async function renderPedidos() {
  R('page-content').innerHTML = '<div class="loading-full"><div class="spinner"></div></div>';
  const data = await api('GET','/api/pedidos/');
  R('page-content').innerHTML = `
  <div class="page-header"><h2>Pedidos de Compra</h2></div>
  <div class="filters">
    <input id="pc-search" placeholder="🔍 Buscar..." oninput="filterTable('pc-tbody','pc-search')"/>
    <select onchange="loadPedidosByStatus(this.value)">
      <option value="">Todos</option>
      <option value="aguardando_aprovacao">Ag. Aprovação</option>
      <option value="aprovado">Aprovado</option><option value="reprovado">Reprovado</option>

function pedidoRow(p) { return `<tr>
  <td><b>${p.numero}</b></td><td>${p.requisicao_numero}</td><td>${p.item_nome}</td>
  <td>${p.fornecedor_nome}</td><td style="font-weight:600;color:var(--green);">${fmt(p.preco_total)}</td>
  <td>${fmtDate(p.previsao_entrega)}</td><td>${badge(p.status)}</td>
  <td><button class="btn btn-ghost btn-sm" onclick="showPedidoDetail(${p.id})">Ver</button></td>
</tr>`; }
async function loadPedidosByStatus(status) {
  const data = await api('GET', status?`/api/pedidos/?status=${status}`:'/api/pedidos/');
  R('pc-tbody').innerHTML = (data||[]).map(p=>pedidoRow(p)).join('');
}

async function showNovoPedido(reqId) {
  const [req, cotacoes, fornecedores] = await Promise.all([
    api('GET',`/api/requisicoes/${reqId}`), api('GET',`/api/requisicoes/${reqId}/cotacoes`), api('GET','/api/fornecedores/')
  ]);
  const cotSel = (cotacoes||[]).find(c=>c.selecionada);
  const fopts = (fornecedores||[]).map(f=>`<option value="${f.id}" ${cotSel&&cotSel.fornecedor_id===f.id?'selected':''}>${f.razao_social}</option>`).join('');
  const cotsOpts = (cotacoes||[]).map(c=>`<option value="${c.id}" data-forn="${c.fornecedor_id}" data-unit="${c.preco_unitario}" data-qty="${c.quantidade}" data-prazo="${c.prazo_entrega_dias||''}" data-pgto="${c.condicao_pagamento||''}" ${cotSel&&c.id===cotSel.id?'selected':''}>${c.fornecedor_nome} — ${fmt(c.preco_total)}</option>`).join('');

  showModal('Gerar Pedido de Compra',`
    <div class="alert alert-info">Requisição: <b>${req.numero}</b> — ${req.item_nome} (${req.quantidade} ${req.item_unidade})</div>
    ${cotsOpts?`<div class="form-group"><label>Usar cotação</label>
      <select id="pc-cot" onchange="preencherDaCotacao(this,'${req.quantidade}')">
        <option value="">— Preencher manualmente —</option>${cotsOpts}</select></div>`:''}
    <div class="form-row">
      <div class="form-group"><label>Fornecedor *</label><select id="pc-forn">${fopts}</select></div>
      <div class="form-group"><label>Quantidade *</label>
        <div style="display:flex;gap:6px;"><input type="number" id="pc-qty" value="${req.quantidade}" step="0.01" style="flex:1;" oninput="calcPcTotal()"/>
        <input type="text" value="${req.item_unidade}" readonly style="width:60px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius2);padding:8px;color:var(--text2);"/></div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Preço unitário (R$) *</label><input type="number" id="pc-preco" step="0.01" min="0" placeholder="0,00" oninput="calcPcTotal()"/></div>
      <div class="form-group"><label>Total: <b id="pc-total" style="color:var(--green);">R$ 0,00</b></label></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Cond. pagamento</label><input type="text" id="pc-pgto" placeholder="Ex: 30 dias"/></div>
      <div class="form-group"><label>Prazo entrega (dias)</label><input type="number" id="pc-prazo"/></div>
    </div>
    <div class="form-group"><label>Previsão de entrega</label><input type="date" id="pc-entrega"/></div>
    <div class="form-group"><label>Observações</label><textarea id="pc-obs" rows="2"></textarea></div>
    <div id="pc-msg" style="font-size:12px;"></div>`,
    `<button class="btn btn-ghost" onclick="closeModal('modal-main')">Cancelar</button>
     <button class="btn btn-primary" onclick="submitPedido(${reqId})">Criar Pedido</button>`);

  // Preenche automaticamente da cotação selecionada
  if (cotSel) {
    setTimeout(()=>{
      const sel = R('pc-cot'); if(sel) { sel.value = cotSel.id; preencherDaCotacao(sel, req.quantidade); }
    },50);
  }
}
function preencherDaCotacao(sel, reqQty) {
  if (!sel.value) return;
  const opt = sel.options[sel.selectedIndex];
  if(R('pc-forn')) R('pc-forn').value = opt.dataset.forn;
  if(R('pc-preco')) { R('pc-preco').value = parseFloat(opt.dataset.unit||0).toFixed(2); }
  if(R('pc-qty')) R('pc-qty').value = parseFloat(opt.dataset.qty||reqQty||1);
  if(R('pc-prazo')) R('pc-prazo').value = opt.dataset.prazo||'';
  if(R('pc-pgto')) R('pc-pgto').value = opt.dataset.pgto||'';
  calcPcTotal();
}
function calcPcTotal() {
  const p=parseFloat(R('pc-preco')?.value)||0, q=parseFloat(R('pc-qty')?.value)||0;
  if(R('pc-total')) R('pc-total').textContent=fmt(p*q);
}
async function submitPedido(reqId) {
  const msg = R('pc-msg');
  try {
    const novo = await api('POST','/api/pedidos/',{
      requisicao_id:reqId, cotacao_id:parseInt(R('pc-cot')?.value)||null,
      fornecedor_id:parseInt(R('pc-forn').value), quantidade:parseFloat(R('pc-qty').value),
      preco_unitario:parseFloat(R('pc-preco').value), condicao_pagamento:R('pc-pgto').value||null,
      prazo_entrega_dias:parseInt(R('pc-prazo').value)||null, previsao_entrega:R('pc-entrega').value||null,
      observacoes:R('pc-obs').value||null
    });
    closeModal('modal-main'); closeModal('modal-detail');
    if(currentPage==='pedidos') renderPedidos();
    else if(currentPage==='kanban' && novo) { const reqAtual=await api('GET',`/api/requisicoes/${reqId}`); refreshKanbanCard('req',reqId,reqAtual); refreshKanbanCard('pc',novo.id,novo); }
    else if(currentPage==='requisicoes') renderRequisicoes();
  } catch(e) { msg.style.color='var(--red)'; msg.textContent=e.message; }
}

        <div class="info-item"><div class="ii-label">Preço unit.</div><div class="ii-value">${fmt(pedido.preco_unitario)}</div></div>

        <div class="info-item"><div class="ii-label">Status</div><div class="ii-value">${badge(pedido.status)}</div></div>

function switchTab(el,tabId) {
  el.closest('.modal-body').querySelectorAll('[id^="pd-"]').forEach(t=>t.style.display='none');
  el.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  R(tabId).style.display='block'; el.classList.add('active');
}
async function aprovarPedido(id, aprovado) {

        <td><b>${u.nome}</b></td><td>${u.email}</td><td>${u.cargo||'-'}</td>
        <td><span class="badge badge-${u.role==='admin'?'urgente':u.role==='gestor'?'alta':'media'}">${{admin:'Admin',gestor:'Gestor',tecnico:'Técnico'}[u.role]}</span></td>
        <td>${u.is_active?'<span class="badge badge-aprovado">Ativo</span>':'<span class="badge badge-cancelado">Inativo</span>'}</td>
        <td><div class="actions">
          <button class="btn btn-ghost btn-sm" onclick="showEditUser(${u.id})">Editar</button>
          ${u.id!==currentUser.id?(u.is_active?`<button class="btn btn-danger btn-sm" onclick="toggleUser(${u.id},false)">Desativar</button>`:`<button class="btn btn-success btn-sm" onclick="toggleUser(${u.id},true)">Ativar</button>`):''}
        </div></td>
      </tr>`).join('')}
    </tbody></table></div>`;
}
function showNovoUser() {
  showModal('Novo Usuário',`
    <div class="form-group"><label>Nome *</label><input type="text" id="nu-nome"/></div>
    <div class="form-row">
      <div class="form-group"><label>E-mail *</label><input type="email" id="nu-email"/></div>
      <div class="form-group"><label>Senha *</label><input type="password" id="nu-senha"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Perfil</label><select id="nu-role">
        <option value="tecnico">Técnico</option><option value="gestor">Gestor</option><option value="admin">Admin</option></select></div>
      <div class="form-group"><label>Cargo</label><input type="text" id="nu-cargo"/></div>
    </div>
    <div id="nu-msg" style="font-size:12px;"></div>`,
    `<button class="btn btn-ghost" onclick="closeModal('modal-main')">Cancelar</button>
     <button class="btn btn-primary" onclick="submitUser()">Salvar</button>`);
}
async function submitUser() {
  const msg=R('nu-msg');
  try {
    await api('POST','/api/users/',{nome:R('nu-nome').value,email:R('nu-email').value,
      password:R('nu-senha').value,role:R('nu-role').value,cargo:R('nu-cargo').value||null});
    closeModal('modal-main'); renderUsuarios();
  } catch(e){msg.style.color='var(--red)';msg.textContent=e.message;}
}
async function showEditUser(id) {
  const data = await api('GET','/api/users/');
  const u=(data||[]).find(x=>x.id===id); if(!u) return;
  showModal('Editar Usuário',`
    <div class="form-group"><label>Nome</label><input type="text" id="eu-nome" value="${u.nome}"/></div>
    <div class="form-row">
      <div class="form-group"><label>Perfil</label><select id="eu-role">
        <option value="tecnico" ${u.role==='tecnico'?'selected':''}>Técnico</option>
        <option value="gestor" ${u.role==='gestor'?'selected':''}>Gestor</option>
        <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option></select></div>
      <div class="form-group"><label>Cargo</label><input type="text" id="eu-cargo" value="${u.cargo||''}"/></div>
    </div>
    <div id="eu-msg" style="font-size:12px;"></div>`,
    `<button class="btn btn-ghost" onclick="closeModal('modal-main')">Cancelar</button>
     <button class="btn btn-primary" onclick="submitEditUser(${id})">Salvar</button>`);
}
async function submitEditUser(id) {
  const msg=R('eu-msg');
  try {
    await api('PUT',`/api/users/${id}`,{nome:R('eu-nome').value,role:R('eu-role').value,cargo:R('eu-cargo').value||null});
    closeModal('modal-main'); renderUsuarios();
  } catch(e){msg.style.color='var(--red)';msg.textContent=e.message;}
}
async function toggleUser(id, active) {
  if(!confirm(active?'Reativar usuário?':'Desativar usuário?')) return;
  await api('PUT',`/api/users/${id}`,{is_active:active}); renderUsuarios();
}

// Fechar modais clicando fora
['modal-main','modal-detail','modal-conta'].forEach(id=>{
  R(id).addEventListener('click', function(e){if(e.target===this)closeModal(id);});
});

// Init
if(token && currentUser) initApp();
</script>
</body>
</html>
